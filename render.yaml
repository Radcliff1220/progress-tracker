services:
  - type: web
    name: progress-tracker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: progress-data
      mountPath: /var/data
      sizeGB: 1
